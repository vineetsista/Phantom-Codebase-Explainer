version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://phantom:phantom@db:5432/phantom
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./output:/app/output
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://phantom:phantom@db:5432/phantom
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./output:/app/output
      # Bind-mount the Remotion source for live edits...
      - ./frontend/remotion:/app/remotion
      # ...but keep the image-installed node_modules visible (the bind above
      # would otherwise shadow them with the empty host folder). The anonymous
      # volume is initialised from the image's /app/remotion/node_modules on
      # first run, so the worker can call `npx remotion render` immediately.
      - /app/remotion/node_modules
      # remotion.config.ts sets publicDir to path.resolve(__dirname, "../public"),
      # i.e. /app/public. Mount the frontend's public/ folder so brand fonts
      # load and so we can drop per-job audio files into it for staticFile().
      - ./frontend/public:/app/public
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=phantom
      - POSTGRES_PASSWORD=phantom
      - POSTGRES_DB=phantom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom -d phantom"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
